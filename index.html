<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>F1 Family League 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{background:#080808;color:#fff;min-height:100vh;font-family:'Barlow',sans-serif}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:#E8002D;border-radius:2px}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .fade{animation:fadeUp .3s ease}
    .bc{font-family:'Barlow Condensed',sans-serif}
    .card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px 18px;margin-bottom:8px}
    .tab{background:none;border:none;cursor:pointer;padding:10px 18px;font-family:'Barlow Condensed',sans-serif;font-weight:500;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.35);border-bottom:2px solid transparent;transition:all .2s}
    .tab.active{color:#fff;font-weight:700;border-bottom:2px solid #E8002D}
    .row{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:14px 18px;margin-bottom:8px;transition:all .2s}
    .row.top{background:rgba(232,0,45,.08);border-color:rgba(232,0,45,.3)}
    .avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;flex-shrink:0}
    .round-header{padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;user-select:none}
    .round-body{padding:0 18px 16px;border-top:1px solid rgba(255,255,255,.07)}
    .score-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:8px;padding-top:14px}
    .score-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px}
    .dim{color:rgba(255,255,255,.35);font-size:11px}
  </style>
</head>
<body>

<div id="app">
  <div style="text-align:center;padding:100px 20px">
    <div style="font-size:52px;animation:pulse 1.4s infinite;margin-bottom:16px">🏎️</div>
    <div class="bc" style="font-size:15px;letter-spacing:3px;color:rgba(255,255,255,.4)">LOADING RACE DATA</div>
  </div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const YEAR = 2026;

const FAMILY = [
  { name:"Mark",  av:"M",  color:"#3B82F6", con:"red_bull",  conLabel:"Red Bull",
    drivers:["piastri","lawson"],           dl:["O. Piastri","L. Lawson"] },
  { name:"Heidi", av:"H",  color:"#2DD4BF", con:"mercedes",  conLabel:"Mercedes",
    drivers:["russell","lawson"],           dl:["G. Russell","L. Lawson"] },
  { name:"Sofia", av:"S",  color:"#F97316", con:"mercedes",  conLabel:"Mercedes",
    drivers:["norris","antonelli"],         dl:["L. Norris","K. Antonelli"] },
  { name:"Taryn", av:"T",  color:"#E8002D", con:"ferrari",   conLabel:"Ferrari",
    drivers:["max_verstappen","bottas"],    dl:["M. Verstappen","V. Bottas"] },
  { name:"Tim",   av:"Ti", color:"#A855F7", con:"mercedes",  conLabel:"Mercedes",
    drivers:["hamilton","antonelli"],       dl:["L. Hamilton","K. Antonelli"] },
  { name:"Zoe",   av:"Z",  color:"#FBBF24", con:"mercedes",  conLabel:"Mercedes",
    drivers:["hadjar","max_verstappen"],    dl:["I. Hadjar","M. Verstappen"] },
];

const CON_COLORS = {
  red_bull:"#3671C6",mercedes:"#27F4D2",ferrari:"#E8002D",
  mclaren:"#FF8000",aston_martin:"#358C75",alpine:"#FF87BC",
  williams:"#64C4FF",rb:"#6692FF",kick_sauber:"#52E252",haas:"#B6BABD",
};

const FLAGS = {
  Australia:"🇦🇺",Bahrain:"🇧🇭","Saudi Arabia":"🇸🇦",Japan:"🇯🇵",China:"🇨🇳",
  "United States":"🇺🇸",Italy:"🇮🇹",Monaco:"🇲🇨",Spain:"🇪🇸",Canada:"🇨🇦",
  Austria:"🇦🇹","United Kingdom":"🇬🇧",Hungary:"🇭🇺",Belgium:"🇧🇪",
  Netherlands:"🇳🇱",Singapore:"🇸🇬",Azerbaijan:"🇦🇿",Mexico:"🇲🇽",
  Brazil:"🇧🇷",Qatar:"🇶🇦","Abu Dhabi":"🇦🇪",USA:"🇺🇸",UK:"🇬🇧",
};
const flag = c => FLAGS[c] || "🏁";
const MEDALS = ["#FFD700","#C0C0C0","#CD7F32"];
const rankCol = i => MEDALS[i] || "rgba(255,255,255,.25)";

// ─── SCORING ─────────────────────────────────────────────────────────────────
function posPts(pos){ const p=parseInt(pos);return (!isNaN(p)&&p>=1&&p<=20)?21-p:0; }

function findPts(dId, byDriver){
  if(byDriver[dId]!==undefined) return byDriver[dId];
  const s=dId.split("_").pop().toLowerCase();
  for(const [id,pts] of Object.entries(byDriver)){
    if(id.toLowerCase()===s||id.toLowerCase().endsWith("_"+s)) return pts;
  }
  return 0;
}

function scoreRace(results){
  const byD={}, byC={};
  for(const r of results){
    byD[r.Driver.driverId]=posPts(r.position);
    const c=r.Constructor.constructorId;
    if(!byC[c]) byC[c]=[];
    byC[c].push(posPts(r.position));
  }
  return FAMILY.map(m=>{
    const d1=findPts(m.drivers[0],byD);
    const d2=findPts(m.drivers[1],byD);
    const cp=byC[m.con]||[];
    const con=cp.reduce((s,p)=>s+p,0)/2;
    return {name:m.name,d1,d2,con,total:d1+d2+con};
  });
}

// ─── FETCH ───────────────────────────────────────────────────────────────────
async function loadData(){
  const base=`https://api.jolpi.ca/ergast/f1/${YEAR}`;
  const sched=await fetch(`${base}/races.json`).then(r=>r.json());
  const races=sched.MRData?.RaceTable?.Races||[];
  const now=new Date();
  const done=races.filter(r=>new Date(r.date)<now);
  const rounds=await Promise.all(done.map(async race=>{
    try{
      const d=await fetch(`${base}/${race.round}/results.json`).then(r=>r.json());
      const res=d.MRData?.RaceTable?.Races?.[0]?.Results||[];
      return {race,results:res,scores:scoreRace(res)};
    }catch{ return {race,results:[],scores:scoreRace([])}; }
  }));
  return rounds;
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let rounds=[], activeTab="leaderboard", openRound=null;

function getTotals(){
  return FAMILY.map(m=>({
    ...m,
    total:rounds.reduce((s,r)=>s+(r.scores.find(sc=>sc.name===m.name)?.total||0),0)
  })).sort((a,b)=>b.total-a.total);
}

// ─── CHART (SVG) ─────────────────────────────────────────────────────────────
function buildChart(){
  if(!rounds.length) return `
    <div style="text-align:center;padding:60px 0;color:rgba(255,255,255,.3)">
      <div style="font-size:36px;margin-bottom:10px">📈</div>
      <div class="bc" style="font-size:14px;letter-spacing:2px">CHART WILL POPULATE AFTER RACE 1</div>
    </div>`;

  const W=800, H=280, PL=44, PR=16, PT=12, PB=32;
  const cW=W-PL-PR, cH=H-PT-PB;

  // cumulative data
  const cum={};
  FAMILY.forEach(m=>cum[m.name]=0);
  const points=rounds.map(r=>{
    const e={label:`R${r.race.round}`};
    r.scores.forEach(s=>{cum[s.name]=(cum[s.name]||0)+s.total;e[s.name]=cum[s.name];});
    return e;
  });

  const allVals=Object.values(cum);
  const maxV=Math.max(...allVals,1);
  const xs=i=>PL+i*(cW/(rounds.length-1||1));
  const ys=v=>PT+cH-(v/maxV)*cH;

  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">`;

  // grid lines
  for(let i=0;i<=4;i++){
    const y=PT+(cH/4)*i;
    const val=Math.round(maxV-(maxV/4)*i);
    svg+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="rgba(255,255,255,.07)" stroke-dasharray="3 5"/>`;
    svg+=`<text x="${PL-4}" y="${y+4}" text-anchor="end" fill="rgba(255,255,255,.3)" font-size="9" font-family="Barlow Condensed">${val}</text>`;
  }

  // x labels
  rounds.forEach((r,i)=>{
    svg+=`<text x="${xs(i)}" y="${H-2}" text-anchor="middle" fill="rgba(255,255,255,.3)" font-size="9" font-family="Barlow Condensed">R${r.race.round}</text>`;
  });

  // lines per member
  FAMILY.forEach(m=>{
    const pts=points.map(p=>p[m.name]||0);
    if(rounds.length===1){
      svg+=`<circle cx="${xs(0)}" cy="${ys(pts[0])}" r="4" fill="${m.color}"/>`;
    } else {
      let d=`M${xs(0)},${ys(pts[0])}`;
      for(let i=1;i<pts.length;i++) d+=` L${xs(i)},${ys(pts[i])}`;
      svg+=`<path d="${d}" fill="none" stroke="${m.color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
      pts.forEach((v,i)=>{ svg+=`<circle cx="${xs(i)}" cy="${ys(v)}" r="3.5" fill="${m.color}"/>`; });
    }
    // end label
    const lastV=pts[pts.length-1];
    svg+=`<text x="${xs(pts.length-1)+6}" y="${ys(lastV)+4}" fill="${m.color}" font-size="10" font-family="Barlow Condensed" font-weight="700">${m.name}</text>`;
  });

  svg+=`</svg>`;
  return svg;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  const totals=getTotals();
  const latest=rounds[rounds.length-1];

  let html=`
  <!-- BG -->
  <div style="position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.012) 0,rgba(255,255,255,.012) 1px,transparent 1px,transparent 8px),
    repeating-linear-gradient(-45deg,rgba(255,255,255,.012) 0,rgba(255,255,255,.012) 1px,transparent 1px,transparent 8px)"></div>
  <div style="position:fixed;top:-120px;left:50%;transform:translateX(-50%);width:700px;height:240px;border-radius:50%;
    background:radial-gradient(ellipse,rgba(232,0,45,.14) 0%,transparent 70%);pointer-events:none;z-index:0"></div>

  <!-- HEADER -->
  <div style="position:sticky;top:0;z-index:100;background:rgba(8,8,8,.93);backdrop-filter:blur(24px);border-bottom:1px solid rgba(232,0,45,.2)">
    <div style="max-width:900px;margin:0 auto;padding:0 16px">
      <div style="display:flex;align-items:center;justify-content:space-between;padding-top:18px">
        <div>
          <div class="bc" style="font-weight:900;font-size:28px;line-height:1">
            <span style="color:#E8002D">F1</span><span style="color:#fff;margin-left:8px">FAMILY LEAGUE</span>
          </div>
          <div class="dim" style="margin-top:3px;letter-spacing:.5px">
            ${rounds.length===0 ? YEAR+' Season — Season kicks off soon' : rounds.length+' race'+(rounds.length>1?'s':'')+' complete · '+YEAR+' Season'}
          </div>
        </div>
        <div class="bc" style="font-weight:700;font-size:11px;letter-spacing:2px;color:#E8002D;background:rgba(232,0,45,.12);border:1px solid rgba(232,0,45,.25);border-radius:20px;padding:4px 12px">
          ${YEAR} SEASON
        </div>
      </div>
      <div style="display:flex;margin-top:10px">
        <button class="tab ${activeTab==='leaderboard'?'active':''}" onclick="switchTab('leaderboard')">Standings</button>
        <button class="tab ${activeTab==='rounds'?'active':''}" onclick="switchTab('rounds')">Rounds</button>
        <button class="tab ${activeTab==='chart'?'active':''}" onclick="switchTab('chart')">Chart</button>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div style="max-width:900px;margin:0 auto;padding:20px 16px 60px;position:relative;z-index:1" class="fade">`;

  // ── STANDINGS ──
  if(activeTab==='leaderboard'){
    if(rounds.length===0){
      html+=`<div style="background:linear-gradient(135deg,rgba(232,0,45,.1),rgba(232,0,45,.03));border:1px solid rgba(232,0,45,.25);border-radius:14px;padding:20px 22px;margin-bottom:22px;text-align:center">
        <div style="font-size:36px;margin-bottom:10px">🏁</div>
        <div class="bc" style="font-weight:800;font-size:20px;margin-bottom:6px">Season Starting — Engines Ready</div>
        <div class="dim" style="font-size:13px">Standings populate automatically after each race weekend</div>
      </div>`;
    }

    if(latest){
      const rWinner=[...latest.scores].sort((a,b)=>b.total-a.total)[0];
      const wColor=FAMILY.find(f=>f.name===rWinner?.name)?.color||'#fff';
      html+=`<div style="background:linear-gradient(135deg,rgba(232,0,45,.1),rgba(232,0,45,.03));border:1px solid rgba(232,0,45,.25);border-radius:14px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:14px">
        <div style="font-size:26px">${flag(latest.race.Circuit?.Location?.country)}</div>
        <div style="flex:1"><div class="bc" style="font-weight:700;font-size:16px">${latest.race.raceName}</div>
          <div class="dim" style="margin-top:2px">Round ${latest.race.round} · ${latest.race.date}</div></div>
        ${rWinner?`<div style="text-align:right"><div class="bc" style="font-weight:800;font-size:18px;color:${wColor}">🏆 ${rWinner.name}</div>
          <div class="dim">Top scorer · ${rWinner.total.toFixed(1)} pts</div></div>`:''}
      </div>`;
    }

    totals.forEach((m,i)=>{
      const gap=i===0?0:totals[0].total-m.total;
      const conColor=CON_COLORS[m.con]||'#aaa';
      html+=`<div class="row${i===0?' top':''}">
        <div class="bc" style="font-weight:900;font-size:${i===0?30:22}px;color:${rankCol(i)};width:34px;text-align:center;flex-shrink:0">${i+1}</div>
        <div class="avatar bc" style="background:${m.color}18;border:2px solid ${m.color}55;color:${m.color}">${m.av}</div>
        <div style="flex:1;min-width:0">
          <div class="bc" style="font-weight:700;font-size:20px">${m.name}</div>
          <div class="dim" style="margin-top:2px;display:flex;gap:6px;flex-wrap:wrap">
            <span>${m.dl[0]}</span><span style="color:rgba(255,255,255,.18)">·</span>
            <span>${m.dl[1]}</span><span style="color:rgba(255,255,255,.18)">·</span>
            <span style="color:${conColor}">${m.conLabel}</span>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div class="bc" style="font-weight:800;font-size:${i===0?32:24}px;line-height:1;color:#fff">${m.total.toFixed(1)}</div>
          <div class="dim" style="font-size:10px;letter-spacing:.5px;text-transform:uppercase;margin-top:2px">${gap>0?'-'+gap.toFixed(1):'LEADER'}</div>
        </div>
      </div>`;
    });

    html+=`<div class="card" style="margin-top:16px">
      <div class="bc" style="font-weight:700;font-size:12px;letter-spacing:1px;color:rgba(255,255,255,.45);margin-bottom:8px">SCORING RULES</div>
      <div style="font-size:12px;color:rgba(255,255,255,.4);line-height:1.9">
        <b style="color:rgba(255,255,255,.7)">Drivers:</b> 1st=20, 2nd=19 … 20th=1pt &nbsp;·&nbsp;
        <b style="color:rgba(255,255,255,.7)">Constructor:</b> Both drivers' points added then halved &nbsp;·&nbsp;
        <b style="color:rgba(255,255,255,.7)">Weekly:</b> D1 + D2 + (Constructor÷2)
      </div>
    </div>`;
  }

  // ── ROUNDS ──
  if(activeTab==='rounds'){
    if(rounds.length===0){
      html+=`<div style="text-align:center;padding:80px 0;color:rgba(255,255,255,.3)">
        <div style="font-size:40px;margin-bottom:12px">🏎️</div>
        <div class="bc" style="font-size:16px;letter-spacing:2px">NO RACES COMPLETED YET</div>
        <div class="dim" style="margin-top:8px;font-size:12px">Check back after the first race weekend</div>
      </div>`;
    } else {
      [...rounds].reverse().forEach(r=>{
        const key=r.race.round;
        const isOpen=openRound===key;
        const sorted=[...r.scores].sort((a,b)=>b.total-a.total);
        const winner=sorted[0];
        const wColor=FAMILY.find(f=>f.name===winner?.name)?.color||'#fff';
        html+=`<div style="background:rgba(255,255,255,.04);border:1px solid ${isOpen?'rgba(232,0,45,.35)':'rgba(255,255,255,.07)'};border-radius:14px;overflow:hidden;margin-bottom:8px">
          <div class="round-header" onclick="toggleRound('${key}')">
            <div style="font-size:26px">${flag(r.race.Circuit?.Location?.country)}</div>
            <div style="flex:1">
              <div class="bc" style="font-weight:700;font-size:17px">${r.race.raceName}</div>
              <div class="dim" style="margin-top:2px">Round ${r.race.round} · ${r.race.date}</div>
            </div>
            ${winner?`<div style="text-align:right">
              <div class="bc" style="font-weight:700;font-size:14px;color:${wColor}">🏆 ${winner.name}</div>
              <div class="dim">${winner.total.toFixed(1)} pts</div>
            </div>`:''}
            <div style="color:rgba(255,255,255,.3);font-size:11px;margin-left:4px">${isOpen?'▲':'▼'}</div>
          </div>`;
        if(isOpen){
          html+=`<div class="round-body"><div class="score-grid">`;
          sorted.forEach((s,idx)=>{
            const col=FAMILY.find(f=>f.name===s.name)?.color||'#fff';
            const av=FAMILY.find(f=>f.name===s.name)?.av||s.name[0];
            html+=`<div class="score-card">
              <div class="bc" style="font-weight:800;font-size:18px;color:${rankCol(idx)};width:22px;flex-shrink:0">${idx+1}</div>
              <div style="width:32px;height:32px;border-radius:50%;background:${col}18;border:1.5px solid ${col}50;
                display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;
                font-weight:800;font-size:12px;color:${col};flex-shrink:0">${av}</div>
              <div style="flex:1">
                <div class="bc" style="font-weight:700;font-size:16px">${s.name}</div>
                <div class="dim" style="font-size:10px;margin-top:1px">D1:${s.d1} + D2:${s.d2} + Con:${s.con.toFixed(1)}</div>
              </div>
              <div class="bc" style="font-weight:800;font-size:22px;color:#fff">${s.total.toFixed(1)}</div>
            </div>`;
          });
          html+=`</div></div>`;
        }
        html+=`</div>`;
      });
    }
  }

  // ── CHART ──
  if(activeTab==='chart'){
    html+=`<div class="card" style="margin-bottom:16px">
      <div class="bc" style="font-weight:700;font-size:15px;letter-spacing:1px;margin-bottom:16px;color:rgba(255,255,255,.8)">CUMULATIVE POINTS — ${YEAR} SEASON</div>
      ${buildChart()}
    </div>`;

    const totalsForLegend=getTotals();
    html+=`<div class="card" style="display:flex;flex-wrap:wrap;gap:12px">`;
    totalsForLegend.forEach(m=>{
      html+=`<div style="display:flex;align-items:center;gap:7px">
        <div style="width:10px;height:10px;border-radius:50%;background:${m.color}"></div>
        <span class="bc" style="font-weight:600;font-size:15px;color:rgba(255,255,255,.75)">${m.name}</span>
        <span class="bc" style="font-size:13px;color:rgba(255,255,255,.35)">${m.total.toFixed(1)}</span>
      </div>`;
    });
    html+=`</div>`;
  }

  html+=`</div>`;
  document.getElementById('app').innerHTML=html;
}

// ─── INTERACTIONS ────────────────────────────────────────────────────────────
function switchTab(t){ activeTab=t; render(); }
function toggleRound(key){ openRound=openRound===key?null:key; render(); }

// ─── INIT ────────────────────────────────────────────────────────────────────
loadData().then(data=>{
  rounds=data;
  render();
}).catch(err=>{
  document.getElementById('app').innerHTML=`
    <div style="text-align:center;padding:80px 20px;color:#E8002D">
      <div style="font-size:36px;margin-bottom:12px">⚠️</div>
      <div class="bc" style="font-size:18px">Failed to load data</div>
      <div style="color:rgba(255,255,255,.4);font-size:13px;margin-top:8px">${err.message}</div>
    </div>`;
});
</script>
</body>
</html>
